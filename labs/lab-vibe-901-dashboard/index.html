<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Dashboard</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --text: #c9d1d9;
            --accent: #58a6ff;
            --muted: #8b949e;
        }
        /* The "Light Vibe" Overrides */
        .light-mode {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --text: #1c1e21;
            --accent: #007bff;
            --muted: #65676b;
        }
        body {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: 100vh; transition: background 0.5s, color 0.5s;
        }
        #clock { font-size: 5rem; font-weight: 200; margin-bottom: 0.5rem; }
        #task-container {
            width: 320px; background: var(--surface);
            padding: 20px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        /* The Toggle Button */
        #vibe-toggle {
            position: fixed; top: 20px; right: 20px;
            background: var(--surface); color: var(--text);
            border: 1px solid var(--muted); padding: 10px;
            border-radius: 50%; cursor: pointer; font-size: 1.2rem;
        }
        input { width: 80%; background: transparent; border: none; border-bottom: 1px solid var(--muted); color: var(--text); padding: 5px; outline: none; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--muted); }
        .completed { text-decoration: line-through; opacity: 0.5; }
    </style>
</head>
<body>
    <button id="vibe-toggle" onclick="toggleVibe()">🌓</button>
    <div id="greeting">Good evening</div>
    <div id="clock">00:00:00</div>
    <div id="task-container">
        <input type="text" id="taskInput" placeholder="Add a task...">
        <ul id="taskList"></ul>
    </div>

    <script>
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString([], {hour12: false});
        }
        setInterval(updateClock, 1000); updateClock();

        function toggleVibe() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('vibe', isLight ? 'light' : 'dark');
        }

        // Load saved vibe
        if (localStorage.getItem('vibe') === 'light') document.body.classList.add('light-mode');

        // Simple Task Logic
        const input = document.getElementById('taskInput');
        const list = document.getElementById('taskList');
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        function render() {
            list.innerHTML = '';
            tasks.forEach((t, i) => {
                const li = document.createElement('li');
                li.className = t.done ? 'completed' : '';
                li.innerHTML = `<span>${t.text}</span>`;
                li.onclick = () => { t.done = !t.done; save(); };
                list.appendChild(li);
            });
        }
        function save() { localStorage.setItem('tasks', JSON.stringify(tasks)); render(); }
        input.onkeypress = (e) => {
            if (e.key === 'Enter' && input.value) { tasks.push({text: input.value, done: false}); input.value=''; save(); }
        }
        render();
    </script>
</body>
</html>
